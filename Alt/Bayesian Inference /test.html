<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mood Mode — Algorithm Test Harness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #08080f;
    --surface:   #0e0e1a;
    --border:    rgba(255,255,255,0.08);
    --border-hi: rgba(255,255,255,0.2);
    --text:      #d8d4ec;
    --muted:     rgba(216,212,236,0.4);
    --serif:     'Cormorant Garamond', Georgia, serif;
    --sans:      'DM Sans', system-ui, sans-serif;
    --mono:      'DM Mono', monospace;
    --radius:    10px;
    --col1:      #9898A8;
  }

  html { background: var(--bg); color: var(--text); font-family: var(--sans); font-weight: 300; }

  body {
    min-height: 100vh;
    padding: 0;
    transition: background 1.6s ease;
  }

  /* ── Animated background orbs ── */
  #orb-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .orb {
    position: absolute; border-radius: 50%;
    filter: blur(80px);
    transition: background 2s ease, transform 2s ease, opacity 1.5s ease;
    opacity: 0.18;
  }
  #orb-a { width: 500px; height: 500px; top: -100px; left: -100px; }
  #orb-b { width: 400px; height: 400px; bottom: -80px; right: -60px; }

  /* ── Layout ── */
  #app {
    position: relative; z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 3rem 2rem 6rem;
  }

  /* ── Header ── */
  header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 3rem;
    border-bottom: 0.5px solid var(--border);
    padding-bottom: 1.5rem;
  }
  .wordmark {
    font-family: var(--serif); font-weight: 300; font-size: 26px;
    letter-spacing: 0.04em;
  }
  .wordmark span { opacity: 0.4; font-size: 13px; font-family: var(--sans); letter-spacing: 0.1em; text-transform: uppercase; margin-left: 12px; }
  .harness-badge {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    opacity: 0.35; font-family: var(--mono);
  }

  /* ── Question grid ── */
  #questions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 28px;
  }

  .q-block {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    transition: border-color 0.3s;
  }
  .q-block.answered { border-color: var(--border-hi); }

  .q-number { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.3; margin-bottom: 6px; font-family: var(--mono); }
  .q-label  { font-family: var(--serif); font-style: italic; font-size: 15px; font-weight: 300; margin-bottom: 14px; line-height: 1.4; opacity: 0.9; }

  .q-options { display: flex; flex-wrap: wrap; gap: 7px; }

  .opt-btn {
    padding: 6px 13px;
    border-radius: 100px;
    border: 0.5px solid var(--border-hi);
    background: transparent;
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: all 0.22s ease;
    outline: none;
  }
  .opt-btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.35); }
  .opt-btn.selected {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.6);
    font-weight: 400;
  }

  /* ── Action bar ── */
  #actions {
    display: flex; gap: 12px; align-items: center; margin-bottom: 36px; flex-wrap: wrap;
  }

  .btn {
    padding: 10px 26px;
    border-radius: 100px;
    border: 0.5px solid var(--border-hi);
    background: transparent;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
    outline: none;
  }
  .btn:hover  { background: rgba(255,255,255,0.08); }
  .btn.primary { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.45); }
  .btn.primary:hover { background: rgba(255,255,255,0.2); }
  .btn.ghost  { opacity: 0.45; }
  .btn.ghost:hover { opacity: 0.75; }

  #answer-count { font-size: 12px; opacity: 0.35; font-family: var(--mono); margin-left: auto; }

  /* ── Error banner ── */
  #error-banner {
    display: none;
    padding: 12px 18px;
    background: rgba(200,72,56,0.12);
    border: 0.5px solid rgba(200,72,56,0.3);
    border-radius: var(--radius);
    font-size: 13px;
    color: #f0a090;
    margin-bottom: 20px;
    font-family: var(--mono);
  }

  /* ── Result panel ── */
  #result-panel {
    display: none;
    border: 0.5px solid var(--border-hi);
    border-radius: 14px;
    overflow: hidden;
    background: var(--surface);
  }

  #result-hero {
    padding: 3rem 2.5rem 2.5rem;
    border-bottom: 0.5px solid var(--border);
    position: relative;
    transition: background 1.6s ease;
  }

  #result-zone {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    opacity: 0.4; font-family: var(--mono); margin-bottom: 10px;
  }
  #result-mood {
    font-family: var(--serif); font-size: 68px; font-weight: 300;
    line-height: 1; letter-spacing: -0.01em;
    margin-bottom: 12px;
  }
  #result-tagline {
    font-family: var(--serif); font-style: italic; font-size: 18px;
    font-weight: 300; line-height: 1.5; opacity: 0.75; max-width: 420px;
    margin-bottom: 24px;
  }
  #result-swatches { display: flex; gap: 8px; }
  .swatch {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.25);
    transition: background 1s ease;
  }
  #result-blended-label {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    opacity: 0.3; margin-top: 8px; font-family: var(--mono);
  }

  /* ── Neighbours ── */
  #result-neighbours {
    padding: 1.5rem 2.5rem;
    border-bottom: 0.5px solid var(--border);
  }
  .section-head {
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    opacity: 0.3; font-family: var(--mono); margin-bottom: 14px;
  }
  .neighbour-row {
    display: flex; align-items: center; gap: 14px;
    padding: 8px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .neighbour-row:last-child { border-bottom: none; }
  .n-name { font-family: var(--serif); font-size: 20px; font-weight: 300; width: 110px; flex-shrink: 0; }
  .n-zone { font-size: 11px; opacity: 0.35; width: 110px; flex-shrink: 0; }
  .n-bar-track { flex: 1; height: 2px; background: rgba(255,255,255,0.08); border-radius: 1px; overflow: hidden; }
  .n-bar-fill  { height: 100%; border-radius: 1px; transition: width 0.6s ease; }
  .n-pct { font-family: var(--mono); font-size: 11px; opacity: 0.4; width: 36px; text-align: right; flex-shrink: 0; }
  .n-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.2); }

  /* ── Motion ── */
  #result-motion {
    padding: 1.5rem 2.5rem;
    border-bottom: 0.5px solid var(--border);
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  }
  .motion-stat { }
  .motion-val { font-family: var(--mono); font-size: 22px; font-weight: 400; line-height: 1; margin-bottom: 5px; }
  .motion-lbl { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.3; }

  /* ── Debug ── */
  #result-debug { padding: 1.5rem 2.5rem; }
  #debug-json {
    font-family: var(--mono); font-size: 12px; line-height: 1.7;
    opacity: 0.45; white-space: pre; overflow-x: auto;
    background: rgba(0,0,0,0.2); border-radius: 6px;
    padding: 14px 16px; margin-top: 10px;
    border: 0.5px solid var(--border);
  }

  /* ── Worked example note ── */
  #example-note {
    font-size: 12px; opacity: 0.35; font-family: var(--mono);
    margin-bottom: 24px; display: none;
    line-height: 1.6;
  }

  @media (max-width: 600px) {
    #questions { grid-template-columns: 1fr; }
    #result-motion { grid-template-columns: 1fr 1fr; }
    #result-mood { font-size: 48px; }
  }
</style>
</head>
<body>

<div id="orb-layer">
  <div class="orb" id="orb-a" style="background:#6040b0;"></div>
  <div class="orb" id="orb-b" style="background:#203060;"></div>
</div>

<div id="app">
  <header>
    <div class="wordmark">Mood Mode <span>peer review</span></div>
    <div class="harness-badge">test harness v2</div>
  </header>

  <div id="error-banner"></div>
  <div id="example-note"></div>

  <div id="questions"></div>

  <div id="actions">
    <button class="btn primary" onclick="runCompute()">Compute mood →</button>
    <button class="btn" onclick="loadExample()">Load worked example</button>
    <button class="btn ghost" onclick="resetAll()">Reset</button>
    <span id="answer-count">0 / 6 answered</span>
  </div>

  <div id="result-panel">
    <div id="result-hero">
      <div id="result-zone"></div>
      <div id="result-mood"></div>
      <div id="result-tagline"></div>
      <div id="result-swatches">
        <div class="swatch" id="sw-primary"></div>
        <div class="swatch" id="sw-secondary"></div>
        <div class="swatch" id="sw-accent"></div>
        <div style="width:1px;background:rgba(255,255,255,0.12);margin:0 6px;"></div>
        <div class="swatch" id="sw-blend-0" title="Blended primary"></div>
        <div class="swatch" id="sw-blend-1" title="Blended secondary"></div>
        <div class="swatch" id="sw-blend-2" title="Blended accent"></div>
      </div>
      <div id="result-blended-label">Primary · · · Blended →</div>
    </div>

    <div id="result-neighbours">
      <div class="section-head">Nearest neighbours — inverse-distance blend</div>
      <div id="neighbours-list"></div>
    </div>

    <div id="result-motion">
      <div class="motion-stat">
        <div class="motion-val" id="mot-angle">—</div>
        <div class="motion-lbl">Angle °</div>
      </div>
      <div class="motion-stat">
        <div class="motion-val" id="mot-intensity">—</div>
        <div class="motion-lbl">Intensity</div>
      </div>
      <div class="motion-stat">
        <div class="motion-val" id="mot-clarity">—</div>
        <div class="motion-lbl">Clarity norm</div>
      </div>
    </div>

    <div id="result-debug">
      <div class="section-head">Debug — full result object</div>
      <pre id="debug-json"></pre>
    </div>
  </div>
</div>

<script type="module">
import { compute, QUESTIONS } from './mood-algorithm.js';

const answers = {};
let lastResult = null;

// ── Render question grid ─────────────────────────────────────────────────────
function renderQuestions() {
  const container = document.getElementById('questions');
  container.innerHTML = QUESTIONS.map((q, qi) => `
    <div class="q-block" id="qblock-${q.id}">
      <div class="q-number">Q${String(qi + 1).padStart(2, '0')} — ${q.id}</div>
      <div class="q-label">${q.label}</div>
      <div class="q-options">
        ${q.options.map(o => `
          <button class="opt-btn" id="opt-${q.id}-${o.id}"
            data-qid="${q.id}" data-oid="${o.id}"
            onclick="window._selectOption('${q.id}', '${o.id}')">
            ${o.label}
          </button>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// ── Option selection ─────────────────────────────────────────────────────────
window._selectOption = function(qId, oId) {
  answers[qId] = oId;

  // Update button states
  document.querySelectorAll(`[data-qid="${qId}"]`).forEach(b => b.classList.remove('selected'));
  document.getElementById(`opt-${qId}-${oId}`)?.classList.add('selected');
  document.getElementById(`qblock-${qId}`)?.classList.add('answered');

  updateCount();
  updateOrbs();
};

function updateCount() {
  const n = Object.keys(answers).length;
  document.getElementById('answer-count').textContent = `${n} / 6 answered`;
}

// ── Atmospheric orb shift on each answer ────────────────────────────────────
const ORB_THEMES = {
  'golden-morning': ['#D4A020','#F06010'],
  'honey-gold':     ['#C09010','#E08010'],
  'ember-red':      ['#A02010','#C04020'],
  'surging':        ['#D04020','#A02010'],
  'racing':         ['#B03010','#902010'],
  'electric':       ['#A060C0','#6030A0'],
  'bright':         ['#C09020','#A07010'],
  'silver-fog':     ['#406080','#304060'],
  'open-blue':      ['#3060A0','#204080'],
  'after-rain':     ['#205040','#104030'],
  'steady':         ['#305040','#204030'],
  'clean-linen':    ['#506080','#304060'],
  'forest-birds':   ['#304828','#203820'],
  'crackling-fire': ['#A04010','#803010'],
  'midnight-air':   ['#101830','#080c20'],
  'midnight-plum':  ['#301840','#200c30'],
  'hollow':         ['#181828','#101020'],
  'depleted':       ['#181828','#101020'],
  'dim':            ['#181828','#101020'],
};

function updateOrbs() {
  const allVals = Object.values(answers);
  const lastVal = allVals[allVals.length - 1];
  const theme = ORB_THEMES[lastVal] || ['#403860','#203060'];
  document.getElementById('orb-a').style.background = theme[0];
  document.getElementById('orb-b').style.background = theme[1];
}

// ── Compute ──────────────────────────────────────────────────────────────────
window.runCompute = function() {
  hideError();
  const n = Object.keys(answers).length;
  if (n < 6) {
    showError(`Answer all 6 questions before computing. (${n}/6 answered)`);
    return;
  }
  try {
    const result = compute(answers);
    lastResult = result;
    renderResult(result);
  } catch (err) {
    showError(err.message);
  }
};

// ── Load worked example ──────────────────────────────────────────────────────
window.loadExample = function() {
  const example = {
    colour:  'storm-grey',
    sky:     'silver-fog',
    pulse:   'flickering',
    texture: 'heavy-wool',
    sound:   'silence',
    battery: 'depleted'
  };
  Object.assign(answers, example);
  Object.entries(example).forEach(([qId, oId]) => {
    document.querySelectorAll(`[data-qid="${qId}"]`).forEach(b => b.classList.remove('selected'));
    document.getElementById(`opt-${qId}-${oId}`)?.classList.add('selected');
    document.getElementById(`qblock-${qId}`)?.classList.add('answered');
  });
  updateCount();
  updateOrbs();

  const note = document.getElementById('example-note');
  note.style.display = 'block';
  note.textContent = 'Worked example loaded: Storm Grey · Silver Fog · Flickering · Heavy Wool · Silence · Depleted — expected zone: Blue Hour';

  window.runCompute();
};

// ── Reset ────────────────────────────────────────────────────────────────────
window.resetAll = function() {
  Object.keys(answers).forEach(k => delete answers[k]);
  document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.q-block').forEach(b => b.classList.remove('answered'));
  document.getElementById('result-panel').style.display = 'none';
  document.getElementById('example-note').style.display = 'none';
  document.getElementById('orb-a').style.background = '#6040b0';
  document.getElementById('orb-b').style.background = '#203060';
  hideError();
  updateCount();
  lastResult = null;
};

// ── Render result ────────────────────────────────────────────────────────────
function renderResult(r) {
  document.getElementById('result-panel').style.display = 'block';

  // Hero
  document.getElementById('result-zone').textContent    = r.zone;
  document.getElementById('result-mood').textContent    = r.mood;
  document.getElementById('result-tagline').textContent = r.tagline;

  // Palette swatches
  document.getElementById('sw-primary').style.background   = r.palette.primary;
  document.getElementById('sw-secondary').style.background = r.palette.secondary;
  document.getElementById('sw-accent').style.background    = r.palette.accent;
  document.getElementById('sw-blend-0').style.background   = r.blendedPalette.primary;
  document.getElementById('sw-blend-1').style.background   = r.blendedPalette.secondary;
  document.getElementById('sw-blend-2').style.background   = r.blendedPalette.accent;

  // Hero background tint
  document.getElementById('result-hero').style.background =
    `radial-gradient(ellipse at 30% 50%, ${r.palette.primary}22 0%, transparent 70%)`;

  // Orbs → result zone colour
  document.getElementById('orb-a').style.background = r.palette.primary;
  document.getElementById('orb-b').style.background = r.palette.accent;

  // Neighbours
  const nl = document.getElementById('neighbours-list');
  nl.innerHTML = r.neighbors.map(n => `
    <div class="neighbour-row">
      <div class="n-name">${n.mood}</div>
      <div class="n-zone">${n.zone}</div>
      <div class="n-bar-track">
        <div class="n-bar-fill" style="width:${Math.round(n.weight*100)}%;background:${r.palette.primary};"></div>
      </div>
      <div class="n-pct">${Math.round(n.weight*100)}%</div>
      <div class="n-dot" style="background:${r.palette.primary};opacity:${0.4 + n.weight*0.6}"></div>
    </div>
  `).join('');

  // Motion
  document.getElementById('mot-angle').textContent     = r.motion.angle + '°';
  document.getElementById('mot-intensity').textContent = r.motion.intensity.toFixed(2);
  document.getElementById('mot-clarity').textContent   = r.motion.clarityNorm.toFixed(2);

  // Debug
  document.getElementById('debug-json').textContent = JSON.stringify(r, null, 2);

  // Scroll to result
  document.getElementById('result-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
}
function hideError() {
  document.getElementById('error-banner').style.display = 'none';
}

// ── Init ─────────────────────────────────────────────────────────────────────
renderQuestions();
updateCount();
</script>
</body>
</html>
