<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mood Mode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#07070e}

#cv-base,#cv-fx{position:fixed;inset:0;z-index:0}
#cv-fx{z-index:1;pointer-events:none}
#grain{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.026;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px}

:root{
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --c:rgba(232,226,255,.93);
  --cm:rgba(200,194,240,.45);
}

/* ── screens ─────────────────────────────────────────────────── */
.screen{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem;pointer-events:none;opacity:0;transition:opacity .65s ease;
}
.screen.active{opacity:1;pointer-events:all}

/* ── intro ───────────────────────────────────────────────────── */
#s-intro{text-align:center}
.i-eye{font-family:var(--sans);font-weight:200;font-size:10px;letter-spacing:.28em;
  text-transform:uppercase;color:var(--cm);margin-bottom:2rem}
.i-title{font-family:var(--serif);font-weight:300;font-size:clamp(46px,8vw,86px);
  line-height:1.02;color:var(--c);letter-spacing:-.015em;margin-bottom:1.2rem}
.i-sub{font-family:var(--serif);font-style:italic;font-weight:300;
  font-size:clamp(16px,2.2vw,20px);color:var(--cm);margin-bottom:1rem;
  line-height:1.5;max-width:340px}
.i-history{font-family:var(--sans);font-weight:200;font-size:11px;
  letter-spacing:.06em;color:var(--cm);margin-bottom:2.8rem;min-height:18px}
.ghost-btn{font-family:var(--sans);font-weight:300;font-size:12px;
  letter-spacing:.16em;text-transform:uppercase;color:var(--c);
  background:transparent;border:.5px solid rgba(200,194,240,.28);
  padding:13px 38px;border-radius:100px;cursor:pointer;
  transition:all .24s;outline:none}
.ghost-btn:hover{background:rgba(200,194,240,.09);border-color:rgba(200,194,240,.55)}

/* ── question ────────────────────────────────────────────────── */
#s-q{text-align:center}
.progress{display:flex;gap:7px;justify-content:center;margin-bottom:2.6rem}
.pdot{width:5px;height:5px;border-radius:50%;background:rgba(200,194,240,.18);transition:all .5s}
.pdot.done{background:rgba(200,194,240,.5)}
.pdot.active{background:rgba(200,194,240,.9);width:20px;border-radius:3px}
.q-num{font-family:var(--sans);font-weight:200;font-size:10px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--cm);margin-bottom:1rem}
.q-label{font-family:var(--serif);font-style:italic;font-weight:300;
  font-size:clamp(22px,3.8vw,38px);color:var(--c);line-height:1.28;
  max-width:520px;margin-bottom:2.6rem;
  transition:opacity .5s,transform .5s}
.q-label.enter{opacity:0;transform:translateY(14px)}

/* -- colour swatches Q1 */
.colour-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;max-width:520px;margin-bottom:2.6rem;}
.colour-card{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;outline:none;background:none;border:none;animation:optIn .38s ease both;}
.colour-swatch{width:58px;height:58px;border-radius:50%;border:2px solid transparent;transition:transform .22s,border-color .22s,box-shadow .22s;}
.colour-card:hover .colour-swatch{transform:scale(1.1);}
.colour-card.sel .colour-swatch{border-color:rgba(255,255,255,.82);transform:scale(1.18);box-shadow:0 0 0 4px rgba(255,255,255,.12);}
.colour-name{font-family:var(--sans);font-weight:200;font-size:10px;letter-spacing:.06em;color:var(--cm);white-space:nowrap;transition:color .2s;}
.colour-card.sel .colour-name{color:var(--c);}

/* -- image cards Q2 sky */
.img-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:540px;margin-bottom:2.6rem;}
.img-card{position:relative;width:118px;height:118px;border-radius:10px;overflow:hidden;cursor:pointer;border:1.5px solid transparent;transition:transform .22s,border-color .22s;animation:optIn .38s ease both;flex-shrink:0;}
.img-card:hover{transform:scale(1.04)}
.img-card.sel{border-color:rgba(255,255,255,.75);transform:scale(1.06)}
.img-card canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;display:block;}
.img-card-label{position:absolute;bottom:0;left:0;right:0;padding:5px 6px 6px;background:linear-gradient(transparent,rgba(0,0,0,.6));font-family:var(--sans);font-weight:300;font-size:10px;letter-spacing:.04em;color:rgba(255,255,255,.88);text-align:center;}
.img-card.sel .img-card-label{color:#fff}


/* ── pill options (Q3–Q6) ────────────────────────────────────── */
.opts{
  display:flex;flex-wrap:wrap;gap:10px;justify-content:center;
  max-width:580px;margin-bottom:2.6rem;
}
.opt{
  font-family:var(--sans);font-weight:300;font-size:13px;letter-spacing:.04em;
  color:var(--c);background:rgba(200,194,240,.04);
  border:.5px solid rgba(200,194,240,.16);padding:10px 22px;border-radius:100px;
  cursor:pointer;transition:background .22s,border-color .22s,transform .22s;
  outline:none;animation:optIn .35s ease both;
}
.opt:hover{background:rgba(200,194,240,.09);border-color:rgba(200,194,240,.4);transform:scale(1.04)}
.opt.sel{background:rgba(200,194,240,.17);border-color:rgba(200,194,240,.68);
  transform:scale(1.06);font-weight:400}
@keyframes optIn{
  from{opacity:0;transform:translateY(8px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

.live-row{display:flex;align-items:center;gap:8px;font-family:var(--sans);
  font-weight:200;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--cm)}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--cm);
  animation:ldot 2s ease-in-out infinite}
@keyframes ldot{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

/* ── convergence screen ──────────────────────────────────────── */
#s-converge{text-align:center;pointer-events:none}
.conv-label{font-family:var(--serif);font-style:italic;font-weight:300;
  font-size:clamp(18px,3vw,26px);color:var(--cm);
  opacity:0;transition:opacity 1s}
.conv-label.show{opacity:1}

/* ── result ──────────────────────────────────────────────────── */
#s-result{text-align:center}
.r-zone{font-family:var(--sans);font-weight:200;font-size:10px;letter-spacing:.26em;
  text-transform:uppercase;color:var(--cm);margin-bottom:1rem}

/* clarity filter applied via JS */
.r-word{
  font-family:var(--serif);font-weight:300;
  font-size:clamp(68px,13vw,128px);line-height:1;letter-spacing:-.02em;
  color:var(--c);margin-bottom:.9rem;cursor:default;
  will-change:transform,filter;transition:transform .08s ease;
}
.r-blend{
  font-family:var(--serif);font-style:italic;font-weight:300;
  font-size:clamp(14px,2vw,18px);color:var(--cm);
  margin-bottom:.5rem;letter-spacing:.01em;min-height:24px;
}
.r-tagline{font-family:var(--serif);font-style:italic;font-weight:300;
  font-size:clamp(16px,2.4vw,21px);color:var(--cm);
  line-height:1.5;max-width:400px;margin-bottom:2.2rem}
.r-swatches{display:flex;gap:9px;justify-content:center;margin-bottom:2.2rem}
.rsw{width:26px;height:26px;border-radius:50%;border:1.5px solid rgba(255,255,255,.22);
  transition:transform .3s}
.rsw:hover{transform:scale(1.3)}

.r-neighbours{display:flex;gap:24px;justify-content:center;margin-bottom:2.4rem}
.rn{text-align:center}
.rn-name{font-family:var(--serif);font-weight:300;font-size:18px;
  color:var(--c);display:block;margin-bottom:3px}
.rn-pct{font-family:var(--sans);font-weight:200;font-size:11px;color:var(--cm)}

.r-actions{display:flex;gap:12px;justify-content:center}
.r-btn{font-family:var(--sans);font-weight:300;font-size:12px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--c);background:transparent;
  border:.5px solid rgba(200,194,240,.22);padding:11px 30px;border-radius:100px;
  cursor:pointer;transition:all .22s;outline:none}
.r-btn:hover{background:rgba(200,194,240,.09);border-color:rgba(200,194,240,.45)}
.r-btn.primary{background:rgba(200,194,240,.11)}

/* history panel */
#s-history{text-align:center;overflow-y:auto;padding:3rem 2rem}
.hist-title{font-family:var(--serif);font-weight:300;font-size:28px;
  color:var(--c);margin-bottom:2rem}
.hist-list{display:flex;flex-direction:column;gap:12px;max-width:420px;width:100%;margin:0 auto 2rem}
.hist-item{
  display:flex;align-items:center;gap:16px;
  background:rgba(200,194,240,.05);border:.5px solid rgba(200,194,240,.14);
  border-radius:10px;padding:14px 18px;
}
.hist-swatch{width:32px;height:32px;border-radius:50%;flex-shrink:0}
.hist-text{text-align:left}
.hist-mood{font-family:var(--serif);font-weight:300;font-size:20px;color:var(--c);display:block}
.hist-meta{font-family:var(--sans);font-weight:200;font-size:11px;color:var(--cm);letter-spacing:.04em}

/* share canvas overlay */
#share-overlay{
  position:fixed;inset:0;z-index:50;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.72);backdrop-filter:blur(8px);
}
#share-overlay.open{display:flex}
#share-card-wrap{position:relative;text-align:center}
#share-canvas{border-radius:16px;display:block;
  box-shadow:0 24px 80px rgba(0,0,0,.6)}
.share-actions{display:flex;gap:10px;justify-content:center;margin-top:16px}
.share-dl{font-family:var(--sans);font-weight:300;font-size:12px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--c);background:rgba(200,194,240,.12);
  border:.5px solid rgba(200,194,240,.35);padding:10px 26px;border-radius:100px;
  cursor:pointer;transition:all .22s;outline:none}
.share-dl:hover{background:rgba(200,194,240,.22)}
.share-close{font-family:var(--sans);font-weight:300;font-size:12px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--cm);background:transparent;
  border:.5px solid rgba(200,194,240,.15);padding:10px 26px;border-radius:100px;
  cursor:pointer;transition:all .22s;outline:none}
.share-close:hover{border-color:rgba(200,194,240,.35)}

/* zone mark */
#zone-mark{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
  z-index:20;pointer-events:none;font-family:var(--sans);font-weight:200;
  font-size:10px;letter-spacing:.24em;text-transform:uppercase;
  color:var(--cm);opacity:0;transition:opacity .9s}

/* reveal util */
.reveal{opacity:0;transform:translateY(14px);
  transition:opacity .7s ease,transform .7s ease}
.reveal.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<canvas id="cv-base"></canvas>
<canvas id="cv-fx"></canvas>
<div id="grain"></div>
<div id="zone-mark"></div>

<!-- share overlay -->
<div id="share-overlay">
  <div id="share-card-wrap">
    <canvas id="share-canvas" width="640" height="800"></canvas>
    <div class="share-actions">
      <button class="share-dl" id="btn-dl">Download image</button>
      <button class="share-close" onclick="MM.closeShare()">Close</button>
    </div>
  </div>
</div>

<!-- INTRO -->
<div class="screen active" id="s-intro">
  <div class="i-eye">Mood Mode</div>
  <div class="i-title">How are you,<br>really?</div>
  <div class="i-sub">Six questions. No right answers.</div>
  <div class="i-history" id="i-hist"></div>
  <button class="ghost-btn" id="btn-start">Begin</button>
</div>

<!-- QUESTION -->
<div class="screen" id="s-q">
  <div class="progress" id="prog"></div>
  <div class="q-num" id="qnum"></div>
  <div class="q-label" id="qlabel"></div>
  <div id="opt-area"></div>
  <div class="live-row">
    <div class="ldot"></div>
    <span id="live-txt">reading the field</span>
  </div>
</div>

<!-- CONVERGENCE -->
<div class="screen" id="s-converge">
  <div class="conv-label" id="conv-label">finding your mood…</div>
</div>

<!-- RESULT -->
<div class="screen" id="s-result">
  <div class="r-zone reveal"       id="r-zone"></div>
  <div class="r-word reveal"       id="r-word"></div>
  <div class="r-blend reveal"      id="r-blend"></div>
  <div class="r-tagline reveal"    id="r-tagline"></div>
  <div class="r-swatches reveal"   id="r-swatches"></div>
  <div class="r-neighbours reveal" id="r-neighbours"></div>
  <div class="r-actions reveal"    id="r-actions">
    <button class="r-btn" onclick="MM.openShare()">Share</button>
    <button class="r-btn" onclick="MM.showHistory()">History</button>
    <button class="r-btn primary" onclick="MM.restart()">Again</button>
  </div>
</div>

<!-- HISTORY -->
<div class="screen" id="s-history">
  <div class="hist-title">Your moods</div>
  <div class="hist-list" id="hist-list"></div>
  <button class="ghost-btn" onclick="MM.backToResult()">Back</button>
</div>

<script type="module">
import { compute, partialCompute as algoPartial, getAdaptiveOrder,
         QUESTIONS, MOOD_MAP }              from './mood-algorithm.js';
import { ANSWER_MAP }                       from './data/answer-map.js';
import { QUESTION_WEIGHTS }                 from './engine/distance.js';

/* ═══════════════════════════════════════════════════════════════
   CANVAS ENGINE
═══════════════════════════════════════════════════════════════ */
const BASE=document.getElementById('cv-base');
const FXC =document.getElementById('cv-fx');
const bc  =BASE.getContext('2d');
const fx  =FXC.getContext('2d');
let W=0,H=0;
function resize(){W=BASE.width=FXC.width=innerWidth;H=BASE.height=FXC.height=innerHeight;}
resize(); addEventListener('resize',resize);

let mx=.5,my=.5,tmx=.5,tmy=.5;
addEventListener('mousemove',e=>{tmx=e.clientX/innerWidth;tmy=e.clientY/innerHeight;});
addEventListener('touchmove',e=>{const t=e.touches[0];tmx=t.clientX/innerWidth;tmy=t.clientY/innerHeight;},{passive:true});

const ORBS=[
  {x:.30,y:.30,r:.55,rgb:[55,30,110],trg:[55,30,110]},
  {x:.70,y:.65,r:.50,rgb:[25,40,100],trg:[25,40,100]},
  {x:.50,y:.80,r:.42,rgb:[35,18,75], trg:[35,18,75] },
  {x:.18,y:.60,r:.36,rgb:[50,65,120],trg:[50,65,120]},
];
let orbPos=ORBS.map(o=>({x:o.x,y:o.y}));

function hexRgb(h){const n=parseInt(h.replace('#',''),16);return[(n>>16)&255,(n>>8)&255,n&255];}
function lerp(a,b,t){return a+(b-a)*t;}
function lerpRgb(a,b,t){return a.map((v,i)=>lerp(v,b[i],t));}

/* ─ Breath — FIX #5: driven primarily by pulse + battery votes ── */
let breathPhase=0, breathRate=.006, breathAmp=.09;
// Set by pickOption when pulse or battery answered
let pulseEnergy=0, batteryEnergy=0;

function updateBreath(motion){
  // Use direct pulse+battery energy votes when available, fall back to motion
  const bodySignal = (pulseEnergy + batteryEnergy) / 2; // -1 to +1
  const normBody   = (bodySignal + 1) / 2;              // 0 to 1
  breathRate = .0028 + normBody * .015;
  breathAmp  = .055  + (1 - motion.clarityNorm) * .095;
}

function applyAtmosphere(pal,motion){
  const p=hexRgb(pal.primary), s=hexRgb(pal.secondary), a=hexRgb(pal.accent), boost=1.65;
  ORBS[0].trg=p.map(v=>Math.min(255,v*boost));
  ORBS[1].trg=s.map(v=>Math.min(255,v*boost));
  ORBS[2].trg=a.map(v=>Math.min(255,v*boost*.7));
  ORBS[3].trg=p.map(v=>Math.min(255,v*boost*.5));
  const ang=(motion.angle*Math.PI)/180, dist=.20+motion.intensity*.14;
  orbPos[0]={x:.5+Math.cos(ang)*dist,        y:.5-Math.sin(ang)*dist};
  orbPos[1]={x:.5-Math.cos(ang)*dist*.75,     y:.5+Math.sin(ang)*dist*.75};
  orbPos[2]={x:.5+Math.cos(ang+1.57)*dist*.5, y:.5+Math.sin(ang+1.57)*dist*.5};
  orbPos[3]={x:.5-Math.cos(ang-1.2)*dist*.4,  y:.5-Math.sin(ang-1.2)*dist*.4};
  updateBreath(motion);
}

function drawBase(){
  bc.clearRect(0,0,W,H); bc.fillStyle='#07070e'; bc.fillRect(0,0,W,H);
  mx+=(tmx-mx)*.04; my+=(tmy-my)*.04;
  breathPhase+=breathRate;
  const bs=1+Math.sin(breathPhase)*breathAmp;
  ORBS.forEach((o,i)=>{
    o.rgb=lerpRgb(o.rgb,o.trg,.018);
    const mOff=i%2===0?1:-1;
    const tx=orbPos[i].x+(mx-.5)*.09*mOff;
    const ty=orbPos[i].y+(my-.5)*.07*(i<2?1:-.6);
    o.x+=(tx-o.x)*.013; o.y+=(ty-o.y)*.013;
    const[r,g,b]=o.rgb.map(Math.round);
    const px=o.x*W, py=o.y*H, rad=o.r*Math.max(W,H)*bs;
    const g2=bc.createRadialGradient(px,py,0,px,py,rad);
    g2.addColorStop(0,`rgba(${r},${g},${b},.32)`);
    g2.addColorStop(.5,`rgba(${r},${g},${b},.11)`);
    g2.addColorStop(1,`rgba(${r},${g},${b},0)`);
    bc.globalCompositeOperation='screen';
    bc.beginPath(); bc.arc(px,py,rad,0,Math.PI*2);
    bc.fillStyle=g2; bc.fill();
  });
  bc.globalCompositeOperation='source-over';
}

/* ═══════════════════════════════════════════════════════════════
   PROCEDURAL IMAGE CARDS — FIX #1
   Each colour/sky option rendered as a small canvas painting
   using the option's emotional character, no external images needed
═══════════════════════════════════════════════════════════════ */

// Colour option visual definitions
const COLOUR_SCENES = {
  'honey-gold':    (c,w,h)=>paintGradScene(c,w,h,['#C8780A','#E8A820','#F5C840','#A05010'],[[.5,.5,.9],[.2,.7,.5]]),
  'ember-red':     (c,w,h)=>paintFireScene(c,w,h),
  'petal-blush':   (c,w,h)=>paintGradScene(c,w,h,['#C07890','#E8A0B0','#F0C0C8','#902858'],[[.4,.6,.7],[.7,.3,.5]]),
  'morning-frost': (c,w,h)=>paintGradScene(c,w,h,['#88A8C0','#B8D0E0','#D8EAF0','#607080'],[[.5,.3,.8],[.3,.7,.6]]),
  'storm-grey':    (c,w,h)=>paintStormScene(c,w,h),
  'forest-floor':  (c,w,h)=>paintForestScene(c,w,h),
  'midnight-plum': (c,w,h)=>paintGradScene(c,w,h,['#1A0830','#3A1050','#501870','#100420'],[[.4,.5,.7],[.6,.3,.5]]),
  'arctic-dusk':   (c,w,h)=>paintGradScene(c,w,h,['#1A2850','#2A4070','#384888','#101828'],[[.5,.4,.8],[.3,.6,.5]]),
};
// Sky option visual definitions
const SKY_SCENES = {
  'golden-morning': (c,w,h)=>paintSkyGrad(c,w,h,['#0A0820','#1A2040','#E06010','#F09030','#F8C060']),
  'silver-fog':     (c,w,h)=>paintFogScene(c,w,h),
  'open-blue':      (c,w,h)=>paintSkyGrad(c,w,h,['#0A1830','#1A3860','#2870C0','#58A8E8','#90D0F8']),
  'distant-storm':  (c,w,h)=>paintStormSky(c,w,h),
  'amber-dusk':     (c,w,h)=>paintSkyGrad(c,w,h,['#0A0818','#2A1040','#881828','#D04818','#E88030']),
  'midnight-air':   (c,w,h)=>paintSkyGrad(c,w,h,['#000008','#050818','#080C28','#101838','#182048']),
  'after-rain':     (c,w,h)=>paintAfterRainScene(c,w,h),
  'windswept':      (c,w,h)=>paintWindScene(c,w,h),
};

function paintGradScene(c,w,h,stops,orbs){
  const g=c.createLinearGradient(0,h,w,0);
  stops.forEach((s,i)=>g.addColorStop(i/(stops.length-1),s));
  c.fillStyle=g; c.fillRect(0,0,w,h);
  orbs.forEach(([ox,oy,r])=>{
    const g2=c.createRadialGradient(ox*w,oy*h,0,ox*w,oy*h,r*w);
    g2.addColorStop(0,'rgba(255,255,255,.15)'); g2.addColorStop(1,'rgba(255,255,255,0)');
    c.fillStyle=g2; c.fillRect(0,0,w,h);
  });
}
function paintSkyGrad(c,w,h,stops){
  const g=c.createLinearGradient(0,h,0,0);
  stops.forEach((s,i)=>g.addColorStop(i/(stops.length-1),s));

   PER-QUESTION FX
═══════════════════════════════════════════════════════════════ */
let currentFX = null;

function fxColour(){
  const blobs=Array.from({length:5},(_,i)=>({x:.2+i*.16,y:.3+Math.random()*.4,r:Math.random()*.18+.08,vx:(Math.random()-.5)*.0008,vy:(Math.random()-.5)*.0006,phase:Math.random()*Math.PI*2}));
  return t=>{
    fx.clearRect(0,0,W,H);
    blobs.forEach(b=>{
      b.phase+=.008; b.x+=b.vx+(mx-.5)*.0015; b.y+=b.vy+(my-.5)*.001;
      if(b.x<0||b.x>1)b.vx*=-1; if(b.y<0||b.y>1)b.vy*=-1;
      const px=b.x*W,py=b.y*H,rad=b.r*Math.min(W,H)*(1+Math.sin(b.phase)*.12);
      const g=fx.createRadialGradient(px,py,0,px,py,rad);
      g.addColorStop(0,'rgba(200,194,255,.045)'); g.addColorStop(1,'rgba(200,194,255,0)');
      fx.globalCompositeOperation='screen'; fx.beginPath(); fx.arc(px,py,rad,0,Math.PI*2); fx.fillStyle=g; fx.fill();
    }); fx.globalCompositeOperation='source-over';
  };
}
function fxSky(){
  const bands=Array.from({length:6},(_,i)=>({y:i/5,opacity:.03-.004*i}));
  return t=>{
    fx.clearRect(0,0,W,H);
    bands.forEach((b,i)=>{
      const yPos=(b.y+(my-.5)*.08*(i*.3+.5))*H, th=H*.018;
      const g=fx.createLinearGradient(0,yPos-th,0,yPos+th);
      g.addColorStop(0,'rgba(200,220,255,0)'); g.addColorStop(.5,`rgba(200,220,255,${b.opacity})`); g.addColorStop(1,'rgba(200,220,255,0)');
      fx.fillStyle=g; fx.fillRect(0,yPos-th,W,th*2);
    });
  };
}
function fxPulse(intensity){
  const N=Math.round(60+intensity*120);
  const pts=Array.from({length:N},()=>({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*.0012*(1+intensity),vy:(Math.random()-.5)*.001*(1+intensity),size:Math.random()*1.8+.6,phase:Math.random()*Math.PI*2}));
  const ripples=[];
  function onPulseClick(){ripples.push({x:mx,y:my,r:0,op:.35});}
  FXC.addEventListener('click',onPulseClick);
  // stored so renderQuestion can remove it when switching away
  FXC._pulseCleanup=()=>FXC.removeEventListener('click',onPulseClick);
  return t=>{
    fx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.phase+=.02; p.x+=p.vx+(mx-.5)*.0018; p.y+=p.vy+(my-.5)*.0013;
      if(p.x<0)p.x=1; if(p.x>1)p.x=0; if(p.y<0)p.y=1; if(p.y>1)p.y=0;
      const alpha=(.3+Math.sin(p.phase)*.2)*(.4+intensity*.6);
      fx.beginPath(); fx.arc(p.x*W,p.y*H,p.size,0,Math.PI*2);
      fx.fillStyle=`rgba(200,194,255,${alpha.toFixed(2)})`; fx.fill();
    });
    for(let i=ripples.length-1;i>=0;i--){
      const rp=ripples[i]; rp.r+=2.5; rp.op-=.008;
      if(rp.op<=0){ripples.splice(i,1);continue;}
      fx.beginPath(); fx.arc(rp.x*W,rp.y*H,rp.r,0,Math.PI*2);
      fx.strokeStyle=`rgba(200,194,255,${rp.op.toFixed(2)})`; fx.lineWidth=1; fx.stroke();
    }
  };
}
function fxTexture(clarityNorm){
  const lines=Array.from({length:18},(_,i)=>({y:i/17,freq:2+i*.8,amp:(.005-clarityNorm*.003)*(1+Math.random()),phase:Math.random()*Math.PI*2,speed:.012+Math.random()*.008}));
  return t=>{
    fx.clearRect(0,0,W,H);
    lines.forEach(l=>{
      l.phase+=l.speed+(my-.5)*.004; fx.beginPath();
      for(let x=0;x<W;x+=3){const nx=x/W,y=(l.y+Math.sin(nx*Math.PI*2*l.freq+l.phase)*l.amp+(mx-.5)*.03)*H; x===0?fx.moveTo(x,y):fx.lineTo(x,y);}
      fx.strokeStyle=`rgba(210,205,255,${.025+clarityNorm*.02})`; fx.lineWidth=1; fx.stroke();
    });
  };
}

/* ─ FIX #8: sound-specific FX per selection ──────────────────── */
function fxSound(selectedId){
  const CFG={
    'late-night-piano':   {ring:true,  color:[200,210,255], rate:70,  speed:1.2, particleN:0},
    'forest-birds':       {ring:false, color:[160,220,180], rate:40,  speed:.8,  particleN:30, drift:true},
    'ocean-tide':         {ring:true,  color:[100,180,220], rate:110, speed:.9,  particleN:0,  ellipse:.4},
    'midnight-crickets':  {ring:false, color:[140,180,120], rate:55,  speed:.7,  particleN:15, blink:true},
    'distant-thunder':    {ring:true,  color:[120,130,160], rate:140, speed:2.2, particleN:0,  flash:true},
    'silence':            {ring:false, color:[100,100,120], rate:0,   speed:0,   particleN:3,  silence:true},
    'crackling-fire':     {ring:false, color:[255,140,40],  rate:30,  speed:1.6, particleN:40, fire:true},
    'wind-through-trees': {ring:true,  color:[160,190,160], rate:80,  speed:1.5, particleN:0,  wind:true},
  };
  const cfg = CFG[selectedId] || CFG['late-night-piano'];
  const [cr,cg,cb] = cfg.color;
  const waves=[]; let spawnT=0, flashT=0;
  const birds=cfg.drift?Array.from({length:cfg.particleN},()=>({x:Math.random(),y:.2+Math.random()*.5,vx:.0006+Math.random()*.0008,vy:(Math.random()-.5)*.0003,phase:Math.random()*Math.PI*2})):null;
  const embers=cfg.fire?Array.from({length:cfg.particleN},()=>({x:.3+Math.random()*.4,y:.7+Math.random()*.3,vx:(Math.random()-.5)*.0015,vy:-.001-Math.random()*.002,alpha:Math.random(),size:Math.random()*2+.5})):null;
  const crickets=cfg.blink?Array.from({length:cfg.particleN},()=>({x:Math.random(),y:.3+Math.random()*.6,phase:Math.random()*Math.PI*2,speed:.02+Math.random()*.04})):null;

  return t=>{
    fx.clearRect(0,0,W,H);
    if(cfg.silence){
      // single faint expanding ring, very slow
      spawnT++;
      if(spawnT>300){waves.push({r:0,op:.08});spawnT=0;}
    } else if(cfg.ring&&cfg.rate>0){
      spawnT++;
      if(spawnT>=cfg.rate){waves.push({r:0,op:.22});spawnT=0;}
    }
    const cx=(.38+mx*.24)*W, cy=(.38+my*.24)*H;
    for(let i=waves.length-1;i>=0;i--){
      const w=waves[i]; w.r+=cfg.speed+(mx+my)*.3; w.op-=.003;
      if(w.op<=0){waves.splice(i,1);continue;}
      fx.beginPath();
      const ry=cfg.ellipse?w.r*cfg.ellipse:w.r*.55;
      fx.ellipse(cx,cy,w.r,ry,0,0,Math.PI*2);
      fx.strokeStyle=`rgba(${cr},${cg},${cb},${w.op.toFixed(3)})`; fx.lineWidth=.8; fx.stroke();
    }
    if(cfg.flash){
      flashT++;
      if(flashT>200&&Math.random()<.008){
        const flx=W*(.3+Math.random()*.4), fly=H*.1;
        const fg=fx.createRadialGradient(flx,fly,0,flx,fly,80);
        fg.addColorStop(0,`rgba(${cr},${cg},${cb},.18)`); fg.addColorStop(1,`rgba(${cr},${cg},${cb},0)`);
        fx.fillStyle=fg; fx.fillRect(0,0,W,H);
      }
    }
    if(birds){
      birds.forEach(b=>{
        b.phase+=b.speed||.02; b.x+=b.vx+(mx-.5)*.0008; b.y+=b.vy+Math.sin(b.phase)*.0003;
        if(b.x>1)b.x=0; if(b.y<.1||b.y>.9)b.vy*=-1;
        const alpha=.2+Math.sin(b.phase)*.1;
        // small V shape for birds
        const px=b.x*W, py=b.y*H;
        fx.strokeStyle=`rgba(${cr},${cg},${cb},${alpha})`; fx.lineWidth=1;
        fx.beginPath(); fx.moveTo(px-4,py); fx.lineTo(px,py+2); fx.lineTo(px+4,py); fx.stroke();
      });
    }
    if(embers){
      embers.forEach(e=>{
        e.x+=e.vx+(mx-.5)*.001; e.y+=e.vy; e.alpha-=.004;
        if(e.alpha<=0||e.y<0){e.x=.3+Math.random()*.4;e.y=.7+Math.random()*.1;e.alpha=Math.random();e.vy=-.001-Math.random()*.002;}
        fx.beginPath(); fx.arc(e.x*W,e.y*H,e.size,0,Math.PI*2);
        fx.fillStyle=`rgba(${cr},${cg},${cb},${e.alpha.toFixed(2)})`; fx.fill();
      });
    }
    if(crickets){
      crickets.forEach(k=>{
        k.phase+=k.speed;
        const alpha=Math.max(0,Math.sin(k.phase))*.18;
        fx.beginPath(); fx.arc(k.x*W,k.y*H,1.5,0,Math.PI*2);
        fx.fillStyle=`rgba(${cr},${cg},${cb},${alpha.toFixed(2)})`; fx.fill();
      });
    }
    if(cfg.wind){
      for(let i=0;i<10;i++){
        const sy=H*(.1+(t*.0003+i*.09)%1), curve=W*.06+mx*W*.04;
        fx.strokeStyle=`rgba(${cr},${cg},${cb},.04)`; fx.lineWidth=.8;
        fx.beginPath(); fx.moveTo(0,sy);
        fx.bezierCurveTo(W*.3,sy-curve,W*.7,sy+curve,W,sy+(my-.5)*8);
        fx.stroke();
      }
    }
  };
}

function fxBattery(energyNorm){
  return t=>{
    fx.clearRect(0,0,W,H);
    const cx=W*.5, cy=H*.5, bh=H*.55, by=cy-bh/2;
    fx.strokeStyle='rgba(200,194,255,.07)'; fx.lineWidth=2;
    fx.beginPath(); fx.moveTo(cx,by); fx.lineTo(cx,by+bh); fx.stroke();
    const fillH=bh*energyNorm;
    const gy=fx.createLinearGradient(0,by+bh-fillH,0,by+bh);
    gy.addColorStop(0,'rgba(200,194,255,0)'); gy.addColorStop(.5,'rgba(200,194,255,.12)'); gy.addColorStop(1,'rgba(200,194,255,.06)');
    fx.fillStyle=gy; fx.fillRect(cx-30,by+bh-fillH,60,fillH);
    const nPart=Math.round(energyNorm*12);
    for(let i=0;i<nPart;i++){
      const px=cx+Math.sin((t*.001+i*1.3)*1.7)*22;
      const py=by+bh-((t*.4+i*(bh/nPart))%bh)*energyNorm;
      fx.beginPath(); fx.arc(px,py,1.2,0,Math.PI*2);
      fx.fillStyle=`rgba(200,194,255,${(.15+Math.sin(t*.02+i)*.08).toFixed(2)})`; fx.fill();
    }
    if(energyNorm>.7){
      const sx=cx+(mx-.5)*30, sy=by+bh-fillH;
      const sg=fx.createRadialGradient(sx,sy,0,sx,sy,20);
      sg.addColorStop(0,'rgba(220,210,255,.18)'); sg.addColorStop(1,'rgba(220,210,255,0)');
      fx.fillStyle=sg; fx.beginPath(); fx.arc(sx,sy,20,0,Math.PI*2); fx.fill();
    }
  };
}

/* ─ FIX #6: convergence / result aurora with orbs settling ─── */
function fxConverge(pal){
  const cols=[pal.primary,pal.secondary,pal.accent,pal.primary].map(hexRgb);
  const rings=Array.from({length:3},(_,i)=>({r:Math.max(W,H)*.5*(i+1), op:.0, phase:i*Math.PI*.66}));
  return t=>{
    fx.clearRect(0,0,W,H);
    // rings contracting inward
    rings.forEach(r=>{
      r.r=Math.max(0, r.r-0.8); r.op=Math.min(.18, r.op+.003);
      r.phase+=.01;
      const cx=W*.5+(mx-.5)*20, cy=H*.5+(my-.5)*12;
      const[rr,rg,rb]=cols[0];
      fx.beginPath(); fx.arc(cx,cy,r.r,0,Math.PI*2);
      fx.strokeStyle=`rgba(${rr},${rg},${rb},${r.op.toFixed(3)})`; fx.lineWidth=1; fx.stroke();
    });
  };
}
function fxResult(pal){
  const bands=Array.from({length:4},(_,i)=>({phase:Math.random()*Math.PI*2,speed:.004+i*.002}));
  const cols=[pal.primary,pal.secondary,pal.accent,pal.primary].map(hexRgb);
  return t=>{
    fx.clearRect(0,0,W,H);
    bands.forEach((b,i)=>{
      b.phase+=b.speed;
      const yc=(.3+i*.15+Math.sin(b.phase)*.12+(my-.5)*.08)*H;
      const[r,g,bl]=cols[i];
      const g2=fx.createRadialGradient((.2+mx*.6)*W,yc,0,(.2+mx*.6)*W,yc,W*.45);
      g2.addColorStop(0,`rgba(${r},${g},${bl},.10)`);
      g2.addColorStop(.6,`rgba(${r},${g},${bl},.04)`);
      g2.addColorStop(1,`rgba(${r},${g},${bl},0)`);
      fx.globalCompositeOperation='screen'; fx.fillStyle=g2; fx.fillRect(0,0,W,H);
    }); fx.globalCompositeOperation='source-over';
  };
}

/* ═══════════════════════════════════════════════════════════════
   SHARE CARD GENERATOR — FIX #4
   Renders a 640×800 canvas card for download
═══════════════════════════════════════════════════════════════ */
function renderShareCard(result){
  const cv=document.getElementById('share-canvas');
  const ctx=cv.getContext('2d');
  const cw=640, ch=800;

  // Background gradient from blended palette
  const p=hexRgb(result.blendedPalette.primary);
  const s=hexRgb(result.blendedPalette.secondary);
  const a=hexRgb(result.blendedPalette.accent);

  const bg=ctx.createLinearGradient(0,0,cw,ch);
  bg.addColorStop(0,`rgb(${Math.round(p[0]*.4)},${Math.round(p[1]*.4)},${Math.round(p[2]*.4)})`);
  bg.addColorStop(.5,`rgb(${Math.round(s[0]*.3)},${Math.round(s[1]*.3)},${Math.round(s[2]*.3)})`);
  bg.addColorStop(1,`rgb(${Math.round(a[0]*.25)},${Math.round(a[1]*.25)},${Math.round(a[2]*.25)})`);
  ctx.fillStyle=bg; ctx.fillRect(0,0,cw,ch);

  // Orb glow
  [[.3,.4,.55],[.75,.6,.45],[.5,.8,.35]].forEach(([ox,oy,or])=>{
    const[r,g,b]=[p,s,a][Math.round(ox*2)];
    const rg=ctx.createRadialGradient(ox*cw,oy*ch,0,ox*cw,oy*ch,or*cw);
    rg.addColorStop(0,`rgba(${r},${g},${b},.35)`);
    rg.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.globalCompositeOperation='screen'; ctx.fillStyle=rg; ctx.fillRect(0,0,cw,ch);
  });
  ctx.globalCompositeOperation='source-over';

  // Grain overlay (subtle)
  for(let i=0;i<4000;i++){
    const gx=Math.random()*cw, gy=Math.random()*ch;
    ctx.fillStyle=`rgba(255,255,255,${Math.random()*.025})`; ctx.fillRect(gx,gy,1,1);
  }

  // Zone label
  ctx.font='200 13px "DM Sans"';
  ctx.fillStyle='rgba(220,214,255,.55)';
  ctx.letterSpacing='0.24em';
  ctx.textAlign='center';
  ctx.fillText(result.zone.toUpperCase(), cw/2, 220);

  // Mood word
  ctx.font='300 148px "Cormorant Garamond"';
  ctx.fillStyle='rgba(232,226,255,.95)';
  ctx.textAlign='center';
  ctx.fillText(result.mood, cw/2, 390);

  // Tagline
  ctx.font='300 italic 26px "Cormorant Garamond"';
  ctx.fillStyle='rgba(200,194,240,.65)';
  ctx.textAlign='center';
  // wrap if long
  const words=result.tagline.split(' ');
  let line='', y=460;
  words.forEach(word=>{
    const test=line+word+' ';
    if(ctx.measureText(test).width>480&&line){ctx.fillText(line.trim(),cw/2,y);line=word+' ';y+=36;}
    else line=test;
  });
  if(line)ctx.fillText(line.trim(),cw/2,y); y+=20;

  // Palette strip
  const swX=cw/2-50, swY=y+30, swR=10;
  [result.blendedPalette.primary,result.blendedPalette.secondary,result.blendedPalette.accent].forEach((col,i)=>{
    ctx.beginPath(); ctx.arc(swX+i*36,swY,swR,0,Math.PI*2);
    ctx.fillStyle=col; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=1.5; ctx.stroke();
  });

  // Blend undertones — FIX #2
  if(result.neighbors[1]&&result.neighbors[1].weight>.15){
    const n1=result.neighbors[1], n2=result.neighbors[2];
    let blendStr=`${result.mood}, with traces of ${n1.mood}`;
    if(n2&&n2.weight>.15) blendStr+=` and ${n2.mood}`;
    ctx.font='200 16px "DM Sans"';
    ctx.fillStyle='rgba(200,194,240,.4)';
    ctx.textAlign='center';
    ctx.fillText(blendStr, cw/2, swY+50);
  }

  // Wordmark
  ctx.font='200 italic 18px "Cormorant Garamond"';
  ctx.fillStyle='rgba(200,194,240,.3)';
  ctx.textAlign='center';
  ctx.fillText('Mood Mode', cw/2, ch-48);
}

/* ═══════════════════════════════════════════════════════════════
   APP STATE
═══════════════════════════════════════════════════════════════ */
const answers={};
let qIdx=0, finalResult=null;
let lastSoundId=null;
// #1 adaptive ordering + #4 recency: track answer order
const answerOrder=[];
// Current adaptive question queue (recomputed after each answer)
let questionQueue=[...QUESTIONS];

applyAtmosphere({primary:'#2a1a50',secondary:'#18103a',accent:'#1a1438'},{angle:210,intensity:.05,clarityNorm:.5});

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function setZoneMark(t){const el=document.getElementById('zone-mark');el.textContent=t||'';el.style.opacity=t?'1':'0';}

const LIVE_LABELS=['reading the field','something is taking shape','the field is shifting','getting closer','nearly there','resolving your mood','finalising…'];
function setLive(n){document.getElementById('live-txt').textContent=LIVE_LABELS[Math.min(n,LIVE_LABELS.length-1)];}

function updateConfidence(conf, primaryColor){
  const fill=document.getElementById('confidence-fill');
  if(!fill)return;
  fill.style.width=(conf*100).toFixed(1)+'%';
  fill.style.background=primaryColor||'rgba(200,194,240,.5)';
  fill.style.opacity=0.45+conf*0.4;
}

function renderQuestion(idx){
  // clean up any FX-layer listeners from the previous question
  if(FXC._pulseCleanup){FXC._pulseCleanup();FXC._pulseCleanup=null;}
  const q=QUESTIONS[idx];
  document.getElementById('prog').innerHTML=QUESTIONS.map((_,i)=>`<div class="pdot ${i<idx?'done':i===idx?'active':''}"></div>`).join('');
  document.getElementById('qnum').textContent=`Question ${idx+1} of ${QUESTIONS.length}`;
  const lbl=document.getElementById('qlabel');
  lbl.classList.add('enter'); lbl.textContent=q.label;
  requestAnimationFrame(()=>requestAnimationFrame(()=>lbl.classList.remove('enter')));

  const area=document.getElementById('opt-area');
  area.innerHTML='';

  if(q.id==='colour'){
    const grid=document.createElement('div'); grid.className='colour-grid';
    const HEX={'honey-gold':'#D4A017','ember-red':'#C8402A','petal-blush':'#F0A8B0','morning-frost':'#C8DCE8','storm-grey':'#4A5568','forest-floor':'#3B5E3A','midnight-plum':'#5B2D6E','arctic-dusk':'#2E4A7A'};
    q.options.forEach((o,i)=>{
      const card=document.createElement('button');
      card.className='colour-card'; card.dataset.qid=q.id; card.dataset.oid=o.id;
      card.style.animationDelay=(i*50)+'ms';
      const sw=document.createElement('div'); sw.className='colour-swatch'; sw.style.background=HEX[o.id]||'#888';
      const nm=document.createElement('span'); nm.className='colour-name'; nm.textContent=o.label;
      card.appendChild(sw); card.appendChild(nm);
      card.addEventListener('click',()=>pickOption(q.id,o.id));
      grid.appendChild(card);
    });
    area.appendChild(grid);
    if(answers[q.id]) setTimeout(()=>grid.querySelectorAll('.colour-card').forEach(c=>{if(c.dataset.oid===answers[q.id])c.classList.add('sel');}),q.options.length*50+120);
  } else if(q.id==='sky'){
    const grid=document.createElement('div'); grid.className='img-grid';
    q.options.forEach((o,i)=>{grid.appendChild(renderImageCard(q.id,o,i));});
    area.appendChild(grid);
    if(answers[q.id]) setTimeout(()=>area.querySelectorAll('.img-card').forEach(c=>{if(c.dataset.oid===answers[q.id])c.classList.add('sel');}),q.options.length*55+120);
  } else {
    const wrap=document.createElement('div'); wrap.className='opts';
    q.options.forEach((o,i)=>{
      const btn=document.createElement('button');
      btn.className='opt'; btn.dataset.qid=q.id; btn.dataset.oid=o.id;
      btn.style.animationDelay=(i*48)+'ms'; btn.textContent=o.label;
      btn.addEventListener('click',()=>pickOption(q.id,o.id));
      wrap.appendChild(btn);
    });
    area.appendChild(wrap);
    if(answers[q.id]){
      setTimeout(()=>wrap.querySelectorAll('.opt').forEach(b=>{if(b.dataset.oid===answers[q.id])b.classList.add('sel');}),q.options.length*48+120);
    }
  }

  const partial=partialCompute(answers);
  const state=partial?{intensity:partial.motion.intensity,clarityNorm:partial.motion.clarityNorm,energyNorm:partial.energyNorm,selectedId:lastSoundId}:{intensity:.3,clarityNorm:.5,energyNorm:.5,selectedId:'late-night-piano'};
  // pass selectedId for sound AND timeofday
  const fxState={...state, selectedId: q.id==='sound'?lastSoundId:(q.id==='timeofday'?answers[q.id]||null:lastSoundId)};
  currentFX=FX_MAP[q.id]?FX_MAP[q.id](fxState):null;
  setLive(Object.keys(answers).length);
}

function pickOption(qId,oId){
  // Mark selection visually
  const area=document.getElementById('opt-area');
  area.querySelectorAll(`[data-qid="${qId}"]`).forEach(b=>b.classList.remove('sel'));
  area.querySelector(`[data-qid="${qId}"][data-oid="${oId}"]`)?.classList.add('sel');
  answers[qId]=oId;

  // FIX #5: track pulse/battery energy votes directly for breath
  if(qId==='pulse')  pulseEnergy  = ANSWER_MAP.pulse[oId]?.energy||0;
  if(qId==='battery') batteryEnergy= ANSWER_MAP.battery[oId]?.energy||0;
  if(qId==='sound'||qId==='timeofday') lastSoundId=oId;

  if(!answerOrder.includes(qId)) answerOrder.push(qId);

  const p=partialCompute(answers,answerOrder);
  if(p){
    applyAtmosphere(p.pal,p.motion);
    setZoneMark(p.zone);
    setLive(Object.keys(answers).length);
    updateConfidence(p.confidence,p.pal.primary);
    const remaining=getAdaptiveOrder(answers,p.coord);
    questionQueue=remaining;
  }

  setTimeout(()=>{
    const answered=Object.keys(answers).length;
    if(answered===QUESTIONS.length){triggerConvergence();return;}
    // #1: pick next from adaptive queue (first unanswered)
    const nextQ=questionQueue.find(q=>!answers[q.id]);
    if(nextQ){
      qIdx=QUESTIONS.findIndex(q=>q.id===nextQ.id);
      renderQuestion(qIdx);
    }
  },420);
}

/* ─ FIX #6: convergence beat before result ───────────────────── */
function triggerConvergence(){
  show('s-converge');
  const lbl=document.getElementById('conv-label');
  const p=partialCompute(answers);
  if(p) currentFX=fxConverge(p.pal);
  setTimeout(()=>lbl.classList.add('show'),200);
  setTimeout(()=>{lbl.classList.remove('show');},2000);
  setTimeout(()=>showResult(),2400);
}

/* ─ Show result ──────────────────────────────────────────────── */
function showResult(){
  try{finalResult=compute(answers,answerOrder);}catch(e){console.error(e);return;}
  applyAtmosphere(finalResult.blendedPalette,finalResult.motion);
  setZoneMark('');
  currentFX=fxResult(finalResult.blendedPalette);
  saveToHistory(finalResult);

  document.getElementById('r-zone').textContent=finalResult.zone;
  document.getElementById('r-word').textContent=finalResult.mood;
  document.getElementById('r-tagline').textContent=finalResult.tagline;

  // FIX #7: clarity blur — high clarity = crisp, low clarity = soft blur
  const blurPx=Math.round((1-finalResult.motion.clarityNorm)*4);
  document.getElementById('r-word').style.filter=blurPx>0?`blur(${blurPx}px)`:'none';

  // FIX #2: blend language
  document.getElementById('r-blend').textContent=finalResult.blendLanguage||'';

  document.getElementById('r-swatches').innerHTML=
    [finalResult.blendedPalette.primary,finalResult.blendedPalette.secondary,finalResult.blendedPalette.accent]
    .map(c=>`<div class="rsw" style="background:${c}"></div>`).join('');

  document.getElementById('r-neighbours').innerHTML=
    finalResult.neighbors.map(n=>`<div class="rn"><span class="rn-name">${n.mood}</span><span class="rn-pct">${Math.round(n.weight*100)}%</span></div>`).join('');
  // update confidence bar to final value
  updateConfidence(finalResult.confidence, finalResult.blendedPalette.primary);

  show('s-result');
  const revs=['r-zone','r-word','r-blend','r-tagline','r-swatches','r-neighbours','r-actions'];
  revs.forEach((id,i)=>{
    const el=document.getElementById(id);
    el.classList.remove('show');
    setTimeout(()=>el.classList.add('show'),280+i*260);
  });

  // Mouse parallax on word
  const word=document.getElementById('r-word');
  document.addEventListener('mousemove',e=>{
    if(!document.getElementById('s-result').classList.contains('active'))return;
    const dx=(e.clientX/innerWidth-.5)*20, dy=(e.clientY/innerHeight-.5)*11;
    word.style.transform=`translate(${dx}px,${dy}px)`;
  });
}

/* ═══════════════════════════════════════════════════════════════
   PUBLIC API
═══════════════════════════════════════════════════════════════ */

/* ─ History helpers ──────────────────────────────────────────── */
const HIST_KEY='mood-mode-history';
function loadHistory(){try{return JSON.parse(localStorage.getItem(HIST_KEY)||'[]');}catch{return[];}}
function saveToHistory(result){
  const h=loadHistory();
  h.unshift({mood:result.mood,zone:result.zone,tagline:result.tagline,palette:result.blendedPalette,date:new Date().toISOString()});
  localStorage.setItem(HIST_KEY,JSON.stringify(h.slice(0,14)));
}
function fmtDate(iso){
  const d=new Date(iso);
  return d.toLocaleDateString('en-GB',{weekday:'short',month:'short',day:'numeric'});
}
function showHistoryIntroLabel(){
  const h=loadHistory();
  const el=document.getElementById('i-hist');
  if(!el)return;
  el.textContent=h.length?`Last time: ${h[0].mood} · ${fmtDate(h[0].date)}`:'';
}

window.MM={
  openShare(){
    if(!finalResult)return;
    // Render share card with web fonts loaded
    document.fonts.ready.then(()=>{
      renderShareCard(finalResult);
      document.getElementById('share-overlay').classList.add('open');
      document.getElementById('btn-dl').onclick=()=>{
        const a=document.createElement('a');
        a.download=`mood-mode-${finalResult.mood.toLowerCase()}.png`;
        a.href=document.getElementById('share-canvas').toDataURL('image/png');
        a.click();
      };
    });
  },
  closeShare(){document.getElementById('share-overlay').classList.remove('open');},
  showHistory(){
    const h=loadHistory();
    const list=document.getElementById('hist-list');
    list.innerHTML=h.length?h.map(entry=>`
      <div class="hist-item">
        <div class="hist-swatch" style="background:${entry.palette.primary}"></div>
        <div class="hist-text">
          <span class="hist-mood">${entry.mood}</span>
          <span class="hist-meta">${entry.zone} · ${fmtDate(entry.date)}</span>
        </div>
      </div>`).join(''):'<p style="color:var(--cm);font-size:14px">No history yet.</p>';
    show('s-history');
  },
  backToResult(){show('s-result');},
  restart(){
    Object.keys(answers).forEach(k=>delete answers[k]);
    answerOrder.length=0;
    questionQueue=[...QUESTIONS];
    finalResult=null;qIdx=0;currentFX=null;
    pulseEnergy=0;batteryEnergy=0;lastSoundId=null;
    updateConfidence(0,'');
    applyAtmosphere({primary:'#2a1a50',secondary:'#18103a',accent:'#1a1438'},{angle:210,intensity:.05,clarityNorm:.5});
    setZoneMark('');
    document.querySelectorAll('.reveal').forEach(el=>el.classList.remove('show'));
    document.getElementById('r-word').style.filter='none';
    showHistoryIntroLabel();
    show('s-intro');
  }
};

/* ─ Boot ─────────────────────────────────────────────────────── */
showHistoryIntroLabel();
document.getElementById('btn-start').addEventListener('click',()=>{
  show('s-q');qIdx=0;renderQuestion(0);
});
</script>
